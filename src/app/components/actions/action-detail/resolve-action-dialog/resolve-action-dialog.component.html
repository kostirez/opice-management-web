<div class="modal-backdrop" (click)="onCancel()"></div>
<div class="modal">
  <div class="modal-header">
    <h3>Resolve Action</h3>
    <button class="close-btn" (click)="onCancel()">×</button>
  </div>
  <div class="modal-body">
    <div class="form-group">
      <label for="timestamp">Timestamp</label>
      <input id="timestamp" type="datetime-local" [(ngModel)]="timestampLocal" />
    </div>
    <div class="form-group">
      <label for="timeSpent">Time Spent</label>
      <input id="timeSpent" type="number" [(ngModel)]="timeSpent" placeholder="Enter time spent" />
    </div>
    <div class="form-group">
      <label for="amount">Amount</label>
      <input id="amount" type="number" [(ngModel)]="amount" placeholder="Enter amount" />
    </div>
    <p class="error" *ngIf="error">{{ error }}</p>
  </div>
  <div class="modal-footer">
    <button class="btn btn-secondary" (click)="onCancel()">Cancel</button>
    <button class="btn btn-primary" (click)="onSubmit()">Resolve</button>
  </div>
</div>
